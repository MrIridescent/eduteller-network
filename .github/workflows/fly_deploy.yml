name: 🚀 Zero-Click Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 🛠️ Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: 🚢 Deploy to Johannesburg (JNB)
        run: flyctl deploy --remote-only --ha=false --primary-region jnb
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
