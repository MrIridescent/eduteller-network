# fly.toml app configuration file generated for eduteller-portal on 2026-04-01T10:34:14+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'eduteller-portal'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  CACHE_DRIVER = 'redis'
  DB_CONNECTION = 'pgsql'
  LOG_CHANNEL = 'stderr'
  QUEUE_CONNECTION = 'redis'
  SESSION_DRIVER = 'redis'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
